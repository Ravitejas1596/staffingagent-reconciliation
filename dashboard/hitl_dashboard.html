<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StaffingAgent.ai — Timesheet Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --subtle: #94a3b8;
      --red: #dc2626; --red-bg: #fef2f2; --red-border: #fecaca;
      --amber: #d97706; --amber-bg: #fffbeb; --amber-border: #fde68a;
      --green: #16a34a; --green-bg: #f0fdf4; --green-border: #bbf7d0;
      --blue: #2563eb; --blue-bg: #eff6ff; --blue-border: #bfdbfe;
      --radius: 8px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
    /* ── TOP BAR ─────────────────────────────────────────────────────────── */
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:56px;flex-shrink:0}
    .logo{font-weight:700;font-size:15px;color:#0f172a;letter-spacing:-0.01em;white-space:nowrap}
    .logo span{color:#2563eb}
    .topbar-divider{width:1px;height:24px;background:var(--border)}
    .stat-chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;white-space:nowrap}
    .chip.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
    .chip.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
    .chip.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
    .chip.blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
    .chip.gray{background:#f1f5f9;color:var(--muted);border:1px solid var(--border)}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .week-label{font-size:13px;color:var(--muted)}
    .progress-label{font-size:13px;font-weight:600;color:var(--text)}
    .load-btn{font-size:12px;font-weight:500;padding:6px 12px;background:#f1f5f9;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text)}
    .load-btn:hover{background:#e2e8f0}
    .load-btn input{display:none}
    /* ── LAYOUT ───────────────────────────────────────────────────────────── */
    .layout{display:flex;flex:1;min-height:0}
    /* ── QUEUE SIDEBAR ────────────────────────────────────────────────────── */
    .queue{width:296px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface)}
    .queue-section{padding:8px 0}
    .queue-section-title{font-size:11px;font-weight:600;color:var(--subtle);text-transform:uppercase;letter-spacing:0.07em;padding:10px 14px 6px}
    .qcard{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
    .qcard:hover{background:#f8fafc}
    .qcard.active{background:#eff6ff;border-left:3px solid #2563eb}
    .qcard.active-red{background:var(--red-bg);border-left:3px solid var(--red)}
    .qcard.active-amber{background:var(--amber-bg);border-left:3px solid var(--amber)}
    .qcard.active-green{background:var(--green-bg);border-left:3px solid var(--green)}
    .qcard .qname{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
    .qcard .qrole{font-size:12px;color:var(--muted);margin-bottom:6px}
    .qcard .qissue{font-size:12px;color:var(--text);margin-top:4px;line-height:1.4}
    .qcard .qmoney{font-size:12px;font-weight:600;margin-top:4px}
    .qcard .qdecision{font-size:11px;color:var(--green);margin-top:4px;font-weight:500}
    .status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:0.05em}
    .status-pill.critical{background:var(--red-bg);color:var(--red)}
    .status-pill.warning{background:var(--amber-bg);color:var(--amber)}
    .status-pill.clean{background:var(--green-bg);color:var(--green)}
    .status-pill.missing{background:var(--blue-bg);color:var(--blue)}
    /* ── DETAIL PANEL ─────────────────────────────────────────────────────── */
    .detail{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
    .detail-placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:15px}
    /* Banner */
    .banner{border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
    .banner.critical{background:var(--red-bg);border:1px solid var(--red-border)}
    .banner.warning{background:var(--amber-bg);border:1px solid var(--amber-border)}
    .banner.clean{background:var(--green-bg);border:1px solid var(--green-border)}
    .banner.missing{background:var(--blue-bg);border:1px solid var(--blue-border)}
    .banner-icon{font-size:20px;flex-shrink:0}
    .banner-body{}
    .banner-title{font-size:15px;font-weight:700}
    .banner-title.critical{color:var(--red)}
    .banner-title.warning{color:var(--amber)}
    .banner-title.clean{color:var(--green)}
    .banner-title.missing{color:var(--blue)}
    .banner-sub{font-size:13px;color:var(--muted);margin-top:2px}
    /* Record header */
    .rec-header{margin-bottom:16px}
    .rec-header h1{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
    .rec-meta{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px}
    .rec-meta span::before{content:"·";margin-right:8px;color:var(--subtle)}
    .rec-meta span:first-child::before{display:none}
    /* Sections */
    .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px}
    .section-h{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .section-h .icon{font-size:15px}
    .section p{font-size:14px;color:var(--text);line-height:1.6}
    .section p.muted{color:var(--muted)}
    /* Comparison table */
    .cmp-table{width:100%;border-collapse:collapse;font-size:13px}
    .cmp-table th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--border);text-align:left}
    .cmp-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    .cmp-table tr:last-child td{border-bottom:none}
    .cmp-table tr.diff{background:#fffbeb}
    .cmp-table tr.diff td:first-child{font-weight:600}
    .cmp-table .diff-badge{background:var(--amber-bg);color:var(--amber);font-weight:600;font-size:12px;padding:2px 8px;border-radius:4px;border:1px solid var(--amber-border)}
    .cmp-table .ok-badge{color:var(--green);font-size:13px}
    /* Discrepancy list */
    .disc-list{display:flex;flex-direction:column;gap:6px}
    .disc-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text);padding:8px 10px;background:#fffbeb;border:1px solid var(--amber-border);border-radius:6px;line-height:1.5}
    .disc-item .disc-icon{font-size:14px;flex-shrink:0;margin-top:1px}
    .disc-none{font-size:13px;color:var(--green);padding:8px 10px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:6px}
    /* Compliance */
    .comp-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text);padding:10px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;line-height:1.5}
    .comp-item .comp-icon{font-size:16px;flex-shrink:0;margin-top:1px}
    .comp-none{font-size:13px;color:var(--muted);font-style:italic}
    /* Confidence */
    .confidence-row{display:flex;align-items:center;gap:12px}
    .conf-bar-wrap{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
    .conf-bar{height:100%;border-radius:4px}
    .conf-label{font-size:13px;font-weight:600;min-width:70px}
    .conf-label.high{color:var(--green)}
    .conf-label.medium{color:var(--amber)}
    .conf-label.low{color:#ea580c}
    .conf-label.verylow{color:var(--red)}
    /* Actions */
    .action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
    .btn{font-family:"Inter",sans-serif;font-size:13px;font-weight:600;padding:10px 18px;border-radius:var(--radius);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
    .btn-approve{background:var(--green);color:#fff}
    .btn-approve:hover{background:#15803d}
    .btn-reject{background:#fff;color:var(--red);border:1.5px solid var(--red)}
    .btn-reject:hover{background:var(--red-bg)}
    .btn-escalate{background:#fff;color:var(--amber);border:1.5px solid var(--amber-border)}
    .btn-escalate:hover{background:var(--amber-bg)}
    /* Toast */
    .toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}
  </style>
</head>

    if (score >= 0.85) return {label:"High",cls:"high",color:"#16a34a"};
    if (score >= 0.65) return {label:"Medium",cls:"medium",color:"#d97706"};
    if (score >= 0.50) return {label:"Low",cls:"low",color:"#ea580c"};
    return {label:"Very Low",cls:"verylow",color:"#dc2626"};
  }

  function statusMeta(r) {
    if (r.match_status === "missing") return {label:"Timesheet Missing",cls:"missing",icon:"⊘",bannerIcon:"📋"};
    if (r.severity === "critical")    return {label:"Action Required",cls:"critical",icon:"●",bannerIcon:"⚠️"};
    if (r.severity === "warning")     return {label:"Needs Attention",cls:"warning",icon:"●",bannerIcon:"⚠️"};
    return {label:"Cleared",cls:"clean",icon:"✓",bannerIcon:"✓"};
  }

  function humanDisc(s) {
    return s
      .replace(/VMS=/g,"Hospital: ").replace(/ATS=/g,"Bullhorn: ")
      .replace(/Hours mismatch: /,"Regular hours don\'t match — ")
      .replace(/OT hours mismatch: /,"Overtime hours don\'t match — ")
      .replace(/Bill rate mismatch: /,"Billing rate doesn\'t match — ")
      .replace(/OT rate mismatch: /,"Overtime rate doesn\'t match — ")
      .replace(/Per diem mismatch: /,"Daily allowance (per diem) doesn\'t match — ")
      .replace(/Total amount mismatch: /,"Invoice total doesn\'t match — ")
      .replace("Missing PO number on VMS record","Purchase order number is missing from the hospital\'s system")
      .replace(/PO number mismatch: /,"Purchase order numbers don\'t match — ")
      .replace(/Name variation: /,"Name is spelled differently in each system — ")
      .replace("VMS status: Pending Approval — not yet approved for invoicing","Hospital has not yet approved the timesheet")
      .replace("VMS status: Missing Timesheet — no approved timesheet in VMS","No timesheet was submitted through the hospital\'s system")
      .replace(/Client name mismatch after alias resolution: /,"Client name differs between systems — ");
  }

  function humanCompliance(s) {
    if (s.includes("CA DAILY OT RULE"))
      return {icon:"⚖️", text:"California law requires overtime to be calculated daily (after 8 hours/day), not just weekly. The hospital\'s system only reports weekly totals, so daily overtime can\'t be confirmed automatically. A manual check of the daily timesheet is needed before invoicing."};
    const mH = s.match(/(\d+\.?\d*) total hours/);
    if (s.includes("EXCESSIVE HOURS"))
      return {icon:"⏰", text:"This worker logged " + (mH ? mH[1] : "50+") + " hours in a single week, which is unusually high and may trigger labor law requirements. A supervisor must review and approve this before you can send the invoice."};
    if (s.includes("MISSING TIMESHEET"))
      return {icon:"📋", text:"The worker has not submitted their timesheet through the hospital\'s system. Neither payroll nor invoicing can proceed until the timesheet is submitted and approved."};
    if (s.includes("PENDING APPROVAL"))
      return {icon:"⏳", text:"The hospital has not yet signed off on this timesheet. You cannot invoice the hospital until they approve it in their system."};
    return {icon:"⚠️", text:s};
  }

  function oneLineSummary(r) {
    if (r.match_status === "missing") return "No timesheet submitted";
    if (!r.discrepancies || r.discrepancies.length === 0) {
      if (r.compliance_flags && r.compliance_flags.length > 0) return "Compliance review needed";
      return "All records match";
    }
    const d = r.discrepancies[0];
    const mH = d.match(/VMS=([\d.]+)h vs ATS=([\d.]+)h/);
    if (mH) return "Hours: hospital " + mH[1] + "h, we have " + mH[2] + "h";
    if (d.includes("Bill rate")) return "Billing rate doesn\'t match";
    if (d.includes("OT rate")) return "Overtime rate doesn\'t match";
    const mD = d.match(/diff=\$(\S+)\)/);
    if (mD) return "$" + mD[1] + " total discrepancy";
    if (d.includes("Missing PO")) return "Purchase order missing";
    if (d.includes("Pending Approval")) return "Awaiting hospital approval";
    if (d.includes("Name variation")) return "Name spelled differently";
    return r.discrepancies.length + " issue" + (r.discrepancies.length > 1 ? "s" : "") + " found";
  }

  function generateWhatHappened(r) {
    const llm = r.llm_explanation || "";
    if (llm && !llm.includes("LLM reasoning unavailable")) return llm;
    if (r.match_status === "missing")
      return r.candidate_name + " has an active placement in Bullhorn but no timesheet has been submitted through the hospital\'s system (" + r.vms_platform + "). Payroll cannot be processed and the hospital cannot be invoiced until the worker submits their hours and the hospital approves them.";
    const d = r.discrepancies || [];
    if (d.length === 0 && r.compliance_flags && r.compliance_flags.length > 0)
      return r.llm_explanation || "All data fields match, but this record has been flagged for compliance review. See the compliance notices below.";
    if (d.length === 0) return "All fields in the hospital\'s system match our records in Bullhorn. This record is cleared and ready to process.";
    const v = r.vms_snapshot, a = r.ats_snapshot;
    const parts = [];
    if (Math.abs(v.hours - a.hours) > 0) parts.push("the hospital reported " + v.hours + " regular hours but our Bullhorn record shows " + a.hours + " hours");
    if (Math.abs(v.bill_rate - a.bill_rate) > 0.01) parts.push("the billing rate is " + fmt$(v.bill_rate) + "/hr in the hospital\'s system vs " + fmt$(a.bill_rate) + "/hr in our records");
    if (Math.abs(v.ot_rate - a.ot_rate) > 0.01) parts.push("the overtime rate doesn\'t match (" + fmt$(v.ot_rate) + " vs " + fmt$(a.ot_rate) + ")");
    if (v.po_number === "MISSING") parts.push("the purchase order number is missing from the hospital\'s system");
    if (r.financial_impact > 0) parts.push("creating a " + fmt$(r.financial_impact) + " discrepancy that must be resolved before " + r.candidate_name + " can be paid and the hospital billed");
    if (parts.length > 0) return "There is a discrepancy for " + r.candidate_name + ": " + parts.join("; ") + ".";
    return "This record has " + d.length + " discrepancy(ies) that need to be reviewed.";
  }

  function getWeek() {
    const weeks = [...new Set(DATA.map(r => r.week_ending).filter(Boolean))];
    return weeks[0] || "";
  }

  // ── RENDER TOP BAR ────────────────────────────────────────────────────────
  function renderTopBar() {
    const critical = DATA.filter(r => r.severity === "critical").length;
    const warning  = DATA.filter(r => r.severity === "warning").length;
    const clean    = DATA.filter(r => r.severity === "clean").length;
    const missing  = DATA.filter(r => r.match_status === "missing").length;
    const atRisk   = DATA.filter(r => r.requires_human_review).reduce((s,r) => s + (r.financial_impact||0), 0);
    const chips = document.getElementById("statChips");
    chips.innerHTML = [
      critical ? `<span class="chip red">${critical} action required</span>` : "",
      warning  ? `<span class="chip amber">${warning} need attention</span>` : "",
      missing  ? `<span class="chip blue">${missing} missing timesheet</span>` : "",
      clean    ? `<span class="chip green">${clean} cleared</span>` : "",
      atRisk   ? `<span class="chip gray">${fmt$(atRisk)} at risk</span>` : "",
    ].join("");
    document.getElementById("weekLabel").textContent = "Week ending " + fmtDate(getWeek());
    const reviewed = Object.keys(decisions).length;
    const needReview = DATA.filter(r => r.requires_human_review).length;
    document.getElementById("progressLabel").textContent = reviewed + " of " + needReview + " reviewed";
  }

  // ── RENDER QUEUE ──────────────────────────────────────────────────────────
  function sortedData() {
    const order = {critical:0,warning:1,missing:2,clean:3};
    return [...DATA].sort((a,b) => {
      const ao = order[a.severity] ?? (a.match_status==="missing"?2:9);
      const bo = order[b.severity] ?? (b.match_status==="missing"?2:9);
      return ao - bo || a.placement_id.localeCompare(b.placement_id);
    });
  }

  function renderQueue() {
    const q = document.getElementById("queue");
    q.innerHTML = "";
    const sorted = sortedData();
    const flagged = sorted.filter(r => r.requires_human_review || r.match_status==="missing");
    const cleared = sorted.filter(r => !r.requires_human_review && r.match_status!=="missing");

    const makeCard = r => {
      const sm = statusMeta(r);
      const dec = decisions[r.placement_id];
      const isActive = r.placement_id === selectedId;
      const activeCls = isActive ? (sm.cls==="critical"?"active-red":sm.cls==="warning"?"active-amber":sm.cls==="clean"?"active-green":"active") : "";
      const div = document.createElement("div");
      div.className = "qcard " + activeCls;
      div.dataset.id = r.placement_id;
      div.innerHTML = `
        <div class="qname">${r.candidate_name}</div>
        <div class="qrole">${r.ats_job_title} &nbsp;·&nbsp; ${r.client_name}</div>
        <span class="status-pill ${sm.cls}">${sm.icon} ${sm.label}</span>
        ${r.financial_impact > 0 ? `<div class="qmoney" style="color:${sm.cls==="clean"?"#16a34a":"#dc2626"}">${fmt$(r.financial_impact)} at risk</div>` : ""}
        ${r.requires_human_review ? `<div class="qissue">${oneLineSummary(r)}</div>` : ""}
        ${dec ? `<div class="qdecision">✓ ${dec}</div>` : ""}
      `;
      div.onclick = () => { selectedId = r.placement_id; renderQueue(); renderDetail(); };
      return div;
    };

    if (flagged.length) {
      const s1 = document.createElement("div"); s1.className = "queue-section";
      const t1 = document.createElement("div"); t1.className = "queue-section-title";
      t1.textContent = "Needs Review (" + flagged.length + ")";
      s1.appendChild(t1);
      flagged.forEach(r => s1.appendChild(makeCard(r)));
      q.appendChild(s1);
    }
    if (cleared.length) {
      const s2 = document.createElement("div"); s2.className = "queue-section";
      const t2 = document.createElement("div"); t2.className = "queue-section-title";
      t2.textContent = "Cleared (" + cleared.length + ")";
      s2.appendChild(t2);
      cleared.forEach(r => s2.appendChild(makeCard(r)));
      q.appendChild(s2);
    }
  }

  // ── RENDER DETAIL ─────────────────────────────────────────────────────────
  function renderDetail() {
    const d = document.getElementById("detail");
    const r = DATA.find(x => x.placement_id === selectedId);
    if (!r) { d.innerHTML = `<div class="detail-placeholder">Select a record from the list on the left to review it.</div>`; return; }

    const sm = statusMeta(r);
    const v = r.vms_snapshot, a = r.ats_snapshot;
    const conf = confLevel(r.confidence_score);
    const dec = decisions[r.placement_id];

    // Banner text
    let bannerSub = "";
    if (r.match_status === "missing") bannerSub = "Worker has not submitted hours through the hospital\'s system. Cannot pay worker or invoice hospital.";
    else if (r.severity === "critical") bannerSub = fmt$(r.financial_impact) + " cannot be invoiced until these issues are resolved.";
    else if (r.severity === "warning") bannerSub = fmt$(r.financial_impact > 0 ? r.financial_impact : 0) + " may be affected. Review before processing.";
    else bannerSub = "All records match. Total: " + fmt$(v.total) + ". Ready to invoice.";

    // Comparison table rows
    const cmpRows = [
      ["Regular Hours",    fmtH(v.hours),    fmtH(a.hours),    Math.abs(v.hours-a.hours)>0,       "h"],
      ["Overtime Hours",   fmtH(v.ot_hours), fmtH(a.ot_hours), Math.abs(v.ot_hours-a.ot_hours)>0, "h"],
      ["Billing Rate",     fmtR(v.bill_rate),fmtR(a.bill_rate),Math.abs(v.bill_rate-a.bill_rate)>0.01,"/hr"],
      ["Overtime Rate",    fmtR(v.ot_rate),  fmtR(a.ot_rate),  Math.abs(v.ot_rate-a.ot_rate)>0.01,  "/hr"],
      ["Daily Allowance",  fmt$(v.per_diem), fmt$(a.per_diem), Math.abs(v.per_diem-a.per_diem)>0.01,""],
      ["Total Amount",     fmt$(v.total),    fmt$(a.total),    Math.abs(v.total-a.total)>0.01,       ""],
      ["Purchase Order",   v.po_number,      a.po_number,      v.po_number !== a.po_number,         ""],
      ["Approval Status",  v.status,         "Active in Bullhorn", false, ""],
    ];

    const tableBody = cmpRows.map(([label, vVal, aVal, isDiff]) => {
      const icon = isDiff ? `<span class="diff-badge">Mismatch</span>` : `<span class="ok-badge">✓</span>`;
      return `<tr class="${isDiff?"diff":""}"><td>${label}</td><td>${vVal}</td><td>${aVal}</td><td>${icon}</td></tr>`;
    }).join("");

    // Discrepancies
    const discHtml = (r.discrepancies||[]).length === 0
      ? `<div class="disc-none">✓ No discrepancies found — all fields match.</div>`
      : (r.discrepancies||[]).map(d => `<div class="disc-item"><span class="disc-icon">⚠</span><span>${humanDisc(d)}</span></div>`).join("");

    // Compliance
    const compHtml = (r.compliance_flags||[]).length === 0
      ? `<p class="comp-none">No compliance notices for this placement.</p>`
      : (r.compliance_flags||[]).map(f => {
          const h = humanCompliance(f);
          return `<div class="comp-item"><span class="comp-icon">${h.icon}</span><span>${h.text}</span></div>`;
        }).join("");

    // What to do
    const whatToDo = (r.recommended_action && !r.recommended_action.includes("No action required"))
      ? r.recommended_action
      : (r.requires_human_review
          ? ((r.discrepancies||[]).length === 0 && (r.compliance_flags||[]).length > 0
              ? "Review the compliance notices below and verify that all requirements are met before approving for payroll and invoicing."
              : "Review the discrepancies below and verify the correct values with the hospital and/or the worker before approving for payroll and invoicing.")
          : "No action needed. This record is cleared and can be processed for payroll and invoicing.");

    const escNote = r.escalation_note && !r.escalation_note.includes("lead should review") ? r.escalation_note : "";

    d.innerHTML = `
      <div class="rec-header">
        <h1>${r.candidate_name}</h1>
        <div class="rec-meta">
          <span>${r.ats_job_title}</span>
          <span>${r.client_name}</span>
          <span>${r.ats_state}</span>
          <span>Hospital system: ${r.vms_platform}</span>
          <span>Week ending ${fmtDate(r.week_ending)}</span>
        </div>
      </div>

      <div class="banner ${sm.cls}">
        <span class="banner-icon">${sm.bannerIcon}</span>
        <div class="banner-body">
          <div class="banner-title ${sm.cls}">${sm.label.toUpperCase()}</div>
          <div class="banner-sub">${bannerSub}</div>
        </div>
        ${dec ? `<span class="status-pill clean" style="margin-left:auto">✓ ${dec}</span>` : ""}
      </div>

      <div class="section">
        <div class="section-h"><span class="icon">💬</span> What the AI found</div>
        <p>${generateWhatHappened(r)}</p>
      </div>

      <div class="section">
        <div class="section-h"><span class="icon">✅</span> What you need to do</div>
        <p>${whatToDo}</p>
        ${escNote ? `<p style="margin-top:8px;color:var(--muted);font-size:13px">Escalation note: ${escNote}</p>` : ""}
      </div>

      <div class="section">
        <div class="section-h"><span class="icon">🔢</span> Hours &amp; Pay Comparison</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Rows highlighted in yellow have a mismatch between the hospital\'s system and our Bullhorn records.</p>
        <table class="cmp-table">
          <thead><tr><th>Field</th><th>Hospital (${r.vms_platform})</th><th>Our Records (Bullhorn)</th><th></th></tr></thead>
          <tbody>${tableBody}</tbody>
        </table>
      </div>

      <div class="section">
        <div class="section-h"><span class="icon">⚠️</span> Discrepancies Found</div>
        <div class="disc-list">${discHtml}</div>
      </div>

      <div class="section">
        <div class="section-h"><span class="icon">⚖️</span> Compliance Notices</div>
        ${compHtml}
      </div>

      <div class="section">
        <div class="section-h"><span class="icon">🤖</span> AI Match Confidence</div>
        <div class="confidence-row">
          <div class="conf-bar-wrap"><div class="conf-bar" style="width:${Math.round(r.confidence_score*100)}%;background:${conf.color}"></div></div>
          <span class="conf-label ${conf.cls}">${conf.label}</span>
          <span style="font-size:12px;color:var(--muted)">(${Math.round(r.confidence_score*100)}%) — how confident the system is that this record is correct</span>
        </div>
      </div>

      ${r.requires_human_review ? `
      <div class="section">
        <div class="section-h"><span class="icon">📋</span> Your Decision</div>
        <p style="margin-bottom:12px;color:var(--muted)">After reviewing the information above, choose one of the following actions. Your decision will be recorded.</p>
        <div class="action-row">
          <button class="btn btn-approve" data-act="Approved">✓ Approve — Clear for payroll &amp; invoicing</button>
          <button class="btn btn-reject" data-act="Sent Back">✗ Send Back — Return for correction</button>
          <button class="btn btn-escalate" data-act="Escalated">⏸ Escalate — Flag for supervisor review</button>
        </div>
      </div>` : `
      <div class="section">
        <div class="section-h"><span class="icon">📋</span> Status</div>
        <p class="muted">This record does not require human review. It was automatically cleared by the system.</p>
      </div>`}
    `;

    d.querySelectorAll(".btn").forEach(btn => {
      btn.onclick = () => {
        const act = btn.dataset.act;
        decisions[r.placement_id] = act;
        showToast(r.candidate_name + ": " + act);
        renderTopBar();
        renderQueue();
        renderDetail();
      };
    });
  }

  // ── TOAST ─────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  function render() {
    renderTopBar();
    renderQueue();
    renderDetail();
  }

  selectedId = sortedData().find(r => r.requires_human_review)?.placement_id || sortedData()[0]?.placement_id || null;
  render();
  </script>
</body>
</html>
